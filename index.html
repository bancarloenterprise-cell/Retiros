<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retiro</title>
  
  <!-- SDK de Firebase Realtime Database (v8) alineado con Bancarlo Cloud -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #000;
      color: #eee;
    }

    .header {
      background-color: #00c853;
      color: #000;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .container {
      max-width: 450px;
      margin: 30px auto;
      padding: 20px;
      background: #121212;
      border-radius: 10px;
      box-shadow: 0 0 8px #00c853aa;
    }

    .saldos-box {
      background-color: #1e1e1e;
      border: 1px dashed #444;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .saldos-box div {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
    }

    .saldo-valor {
      color: #00c853;
      font-weight: bold;
    }

    label {
      display: block;
      margin-top: 20px;
      font-size: 15px;
      font-weight: 600;
      color: #ccc;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid #444;
      border-radius: 8px;
      margin-top: 8px;
      font-size: 16px;
      background-color: #222;
      color: #eee;
    }

    input:focus, select:focus {
      border-color: #00c853;
      outline: none;
      background-color: #1b1b1b;
    }

    .error {
      color: #ff5555;
      font-size: 13px;
      margin-top: 5px;
    }

    .info-status {
      color: #00c853;
      font-size: 13px;
      margin-top: 5px;
    }

    button {
      margin-top: 30px;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      color: #000;
      background-color: #00c853;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #00e676;
    }

    .resultado {
      background-color: #003300cc;
      border-left: 5px solid #00c853;
      margin-top: 30px;
      padding: 20px;
      border-radius: 8px;
      display: none;
      color: #b9f6ca;
    }

    .codigo {
      font-size: 26px;
      color: #00e676;
      font-weight: bold;
      margin: 15px 0;
      letter-spacing: 4px;
      text-align: center;
    }

    .fecha {
      font-size: 14px;
      color: #99d99a;
      text-align: center;
    }

    .nota {
      font-size: 13px;
      color: #77bb77;
      margin-top: 15px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .container {
        margin: 20px 10px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    Retiro
  </div>

  <div class="container">
    <div class="saldos-box">
      <strong>Saldos en Firebase:</strong>
      <div><span>Tarjeta de Débito:</span> <span class="saldo-valor" id="viewDebito">Ingresa correo...</span></div>
      <div><span>Tarjeta de Crédito:</span> <span class="saldo-valor" id="viewCredito">Ingresa correo...</span></div>
    </div>

    <form id="retiroForm">
      <label for="email">Correo electrónico de inicio</label>
      <input type="email" id="email" placeholder="ejemplo@correo.com" required />
      <div id="errorEmail" class="error"></div>
      <div id="statusEmail" class="info-status"></div>

      <label for="tipoTarjeta">Selecciona la tarjeta de origen</label>
      <select id="tipoTarjeta" required>
        <option value="debito">Tarjeta de Débito</option>
        <option value="credito">Tarjeta de Crédito (Préstamo)</option>
      </select>

      <label for="monto">Monto a retirar (MXN)</label>
      <input type="number" id="monto" placeholder="Mínimo $20" min="20" max="10000" required />
      <div id="errorMonto" class="error"></div>

      <label for="codigo">Código de seguridad (4 dígitos)</label>
      <input type="password" id="codigo" maxlength="4" placeholder="Ej. 1234" required />
      <div id="errorCodigo" class="error"></div>

      <button type="submit">Generar código</button>
    </form>

    <div class="resultado" id="resultadoBox">
      <div><strong>Tu código es:</strong></div>
      <div class="codigo" id="codigoRetiro">--------</div>
      <div class="fecha" id="fechaHora"></div>
      <div id="infoComision" class="nota"></div>
      <div class="nota">⚠️ Este código es válido por 15 minutos y solo puede usarse una vez. No lo compartas con nadie.</div>
    </div>
  </div>

  <script>
    // Configuración unificada de Realtime Database
    const firebaseConfig = {
        apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw",
        databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com",
        projectId: "bancarlo-23297",
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let saldoDebito = 0;
    let saldoCredito = 0;
    let usuarioListo = false;
    let currentRef = null;
    let myCleanKey = "";

    const form = document.getElementById('retiroForm');
    const inputEmail = document.getElementById('email');
    const codigoRetiro = document.getElementById('codigoRetiro');
    const fechaHora = document.getElementById('fechaHora');
    const resultadoBox = document.getElementById('resultadoBox');
    const infoComision = document.getElementById('infoComision');
    
    const viewDebito = document.getElementById('viewDebito');
    const viewCredito = document.getElementById('viewCredito');

    function cleanEmailKey(email) {
      return email.toLowerCase().replace(/\./g, '_');
    }

    // Lógica para calcular la comisión según la foto
    function calcularComision(monto) {
        if (monto < 400) return 2;
        if (monto >= 500 && monto <= 1000) return 8;
        if (monto > 1000) return 12;
        return 0; // Si es entre 400 y 499, no se especificó comisión, se asume 0
    }

    inputEmail.addEventListener('change', function() {
      const email = inputEmail.value.trim();
      if (!email || !email.includes('@')) {
        document.getElementById('errorEmail').textContent = "⚠️ Introduce un correo electrónico válido.";
        usuarioListo = false;
        return;
      }

      document.getElementById('errorEmail').textContent = "";
      document.getElementById('statusEmail').textContent = "Conectando...";

      const newCleanKey = cleanEmailKey(email);
      if (newCleanKey === myCleanKey) return;

      if (currentRef) currentRef.off();
      myCleanKey = newCleanKey;

      currentRef = database.ref('users/' + myCleanKey);
      currentRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          saldoDebito = data.debito !== undefined ? parseFloat(data.debito) : 0.00;
          saldoCredito = data.credito !== undefined ? parseFloat(data.credito) : 2000.00;
          document.getElementById('statusEmail').textContent = "✓ Cuenta vinculada.";
        } else {
          saldoDebito = 100.00;
          saldoCredito = 2000.00;
          database.ref('users/' + myCleanKey).set({
            debito: saldoDebito,
            ahorro: 0.00,
            credito: saldoCredito
          });
          document.getElementById('statusEmail').textContent = "✓ Nueva cuenta registrada.";
        }
        usuarioListo = true;
        viewDebito.textContent = `$${saldoDebito.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
        viewCredito.textContent = `$${saldoCredito.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
      });
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      if (!usuarioListo) return;

      const tipoTarjeta = document.getElementById('tipoTarjeta').value;
      const montoRetiro = Number(document.getElementById('monto').value);
      const comision = calcularComision(montoRetiro);
      const totalADescontar = montoRetiro + comision;

      if (montoRetiro < 20) {
        document.getElementById('errorMonto').textContent = "El monto debe ser mínimo $20.";
        return;
      }

      let saldoActual = tipoTarjeta === 'debito' ? saldoDebito : saldoCredito;
      if (totalADescontar > saldoActual) {
        document.getElementById('errorMonto').textContent = `Saldo insuficiente. El total a descontar es $${totalADescontar} (incluye comisión de $${comision}).`;
        return;
      }

      const nuevoSaldo = saldoActual - totalADescontar;
      const updatePath = tipoTarjeta === 'debito' ? 'debito' : 'credito';

      database.ref('users/' + myCleanKey + '/' + updatePath).set(parseFloat(nuevoSaldo.toFixed(6)))
      .then(() => {
        if (tipoTarjeta === 'debito') saldoDebito = nuevoSaldo;
        else saldoCredito = nuevoSaldo;
        
        viewDebito.textContent = `$${saldoDebito.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
        viewCredito.textContent = `$${saldoCredito.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;

        codigoRetiro.textContent = '2580' + Math.floor(1000 + Math.random() * 9000);
        fechaHora.textContent = new Date().toLocaleString('es-MX');
        infoComision.innerHTML = `<strong>Comisión aplicada: $${comision}</strong>`;
        resultadoBox.style.display = 'block';
        resultadoBox.scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
